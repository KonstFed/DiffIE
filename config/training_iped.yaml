# Span training: diffusion over (S_l, S_r, O_l, O_r, P_l, P_r) token spans

trainer:
  type: "span_trainer"
  device: null
  learning_rate: 1e-4
  weight_decay: 0.01
  max_grad_norm: 1.0

model:
  label_mapper:
    type: "float_index"
  scheduler:
    num_steps: 1000
    beta_start: 0.0001
    beta_end: 0.02
  encoder:
    model_name: "bert-base-uncased"
    freeze: true
    add_special_tokens: true
  denoiser:
    type: "diffusion_ner"
    embedder_dim: 768
    span_dim: 1000
    label_mapper:
      type: "float_index"

data:
  dataset:
    type: "span"
    split: "train"
    tokenizer_name: "bert-base-uncased"
    filter_spans: true
    use_cache: true
    encoder:
      model_name: "bert-base-uncased"
      freeze: true
      add_special_tokens: true
  batch_size: 32
  num_workers: 4
  pad_token_id: 0
  pad_label_idx: 0

num_epochs: 1000
log_interval: 500
save_path: checkpoints
save_interval: 5
val_full_interval: 20
num_classes: 4
