# Discrete D3PM training with mask_absorbing kernel (x_T = MASK everywhere).
# Uses sequence dataset: token_ids, attention_mask, label_indices (0=O, 1=subj, 2=obj, 3=pred).
# num_states=5 with mask_state_id=4 for padding/MASK.
# scheduler.beta_schedule: subconfig with type (cosine | linear | mi) and type-specific params.

trainer:
  type: "discrete_trainer"
  device: null
  learning_rate: 1e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  # Ignore class 0 (background) in loss with this probability to balance class inequality (0 = off).
  background_drop_prob: 0.8

model:
  temperature: 1e-8
  encoder:
    model_name: "bert-base-uncased"
    freeze: true
    add_special_tokens: true
  scheduler:
    num_states: 5   # O, subject, object, predicate, MASK
    num_steps: 128
    kernel: "mask_absorbing"
    mask_state_id: 4
    device: "cpu"    # overridden by trainer device at runtime
    dtype: "float32"
    # beta_schedule:
    #   type: mi
    #   s_T: 0.1
    #   mode: linear
    #   beta_min: 1e-8
    #   beta_max: 0.02
    beta_schedule:
      type: linear
      beta_min: 1e-4
      beta_max: 0.0467
  denoiser:
    num_states: 5
    model_dim: 256
    ctx_dim: 768     # BERT hidden size
    num_layers: 4
    num_heads: 4
    dropout: 0.0
    fuse: "sum"
  temperature: 1.0
  topk: null

# Train: Imojie TSV + LSOIE train. Val: LSOIE validation + LSOIE test (each wrapped in CachedDataset).
data:
  train_dataset:
    type: "cached"
    datasets:
      # - type: "imojie"
      #   path: "dataset/data/train/4cr_qpbo_extractions.tsv"
      #   tokenizer_name: "bert-base-uncased"
      #   min_success_pct: null
      - type: "sequence"
        split: "train"
        tokenizer_name: "bert-base-uncased"
        filter_spans: true
    encoder:
      model_name: "bert-base-uncased"
      freeze: true
      add_special_tokens: true
    batch_size: 32
  val_dataset:
    type: "cached"
    datasets:
      - type: "sequence"
        split: ["validation", "test"]
        tokenizer_name: "bert-base-uncased"
        filter_spans: true
    encoder:
      model_name: "bert-base-uncased"
      freeze: true
      add_special_tokens: true
    batch_size: 32
  batch_size: 32
  num_workers: 4
  pad_token_id: 0
  pad_label_idx: 0

num_epochs: 10000
log_interval: 100
save_path: checkpoints_discrete
save_interval: 5
val_full_interval: 5
val_metrics_on_train: true
train_val_batches: 50