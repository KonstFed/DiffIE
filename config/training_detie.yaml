# DetIE training: single classification on slot 0 (https://arxiv.org/abs/2206.12514)
# Uses span dataset (one triplet per sentence); encoder + slots with transformer decoder.
# Set use_bipartite_matching: true to enable DETR-style Hungarian loss instead.

trainer:
  type: "detie_trainer"
  device: null
  learning_rate: 1e-4
  weight_decay: 0.01
  max_grad_norm: 1.0
  use_bipartite_matching: false
  matching: "dice"
  no_object_weight: 0.1

model:
  type: "detie"
  encoder:
    model_name: "bert-base-uncased"
    freeze: false
    add_special_tokens: true
  num_slots: 20
  d_model: 512
  n_heads: 8
  n_decoder_layers: 2
  d_ff: null
  dropout: 0.1
  num_classes: 4

data:
  dataset:
    type: "span"
    split: "train"
    tokenizer_name: "bert-base-uncased"
    filter_spans: true
    use_cache: false
    encoder: null
  batch_size: 32
  num_workers: 4
  pad_token_id: 0
  pad_label_idx: 0

num_epochs: 100
log_interval: 100
save_path: checkpoints_detie
save_interval: 5
val_full_interval: 5
